<html lang="en">
<head>

<title>GEO Auditor ┬╖ Headlights, Not Rearview Mirror</title>
<style>

  --bg: #ffffff; --card: #f8f9fa; --bd: #e2e4e7; --tx: #1a1a2e;

  --dim-bar-bg: #e5e7eb; --hover-bg: rgba(0,0,0,.03); --badge-bg: rgba(37,99,235,.08);
  --badge-bd: rgba(37,99,235,.18); --survey-bg: rgba(37,99,235,.04);
  --survey-bd: rgba(37,99,235,.12);
}
[data-theme="dark"] {
  --bg: #161e2b; --card: #1e2d3d; --bd: #2d3f54; --tx: #d4dee8;
  --mu: #7a8fa0; --ac: #5b8def; --dn: #f87171; --gn: #34d399; --or: #fbbf24;
  --dim-bar-bg: rgba(255,255,255,.08); --hover-bg: rgba(255,255,255,.03);
  --badge-bg: rgba(88,166,255,.1); --badge-bd: rgba(88,166,255,.2);
  --survey-bg: rgba(88,166,255,.05); --survey-bd: rgba(88,166,255,.15);
}
* { margin:0;padding:0;box-sizing:border-box }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--tx); min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}
.container { width: 100%; max-width: 800px; padding: 20px; }
header {
  text-align: center; padding: 30px 0 20px;
  border-bottom: 1px solid var(--bd); margin-bottom: 24px;
}
header h1 { font-size: 1.6em; color: var(--tx); }
header p { font-size: .85em; color: var(--mu); margin-top: 6px; }
.badges { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.badge {
  font-size: 11px; padding: 3px 10px; border-radius: 12px;
  background: var(--badge-bg); color: var(--ac); border: 1px solid var(--badge-bd);
}
textarea {
  width: 100%; height: 260px; background: var(--card); border: 1px solid var(--bd);
  border-radius: 8px; padding: 16px; font-size: 14px; line-height: 1.7;
  color: var(--tx); font-family: inherit; resize: vertical;
}
textarea:focus { outline: none; border-color: var(--ac); }
.btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.btn {
  padding: 9px 18px; border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: .2s;
}
.btn-ac { background: var(--ac); color: #fff; }
.btn-ac:hover { background: #79c0ff; }
.btn-out {
  background: transparent; border: 1px solid var(--bd); color: var(--tx);
}
.btn-out:hover { background: var(--hover-bg); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.result { display: none; margin-top: 20px; }
.score-circle {
  width: 90px; height: 90px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 1.6em; font-weight: 700;
  margin: 0 auto 16px;
}
.s-great { background: #2d6a4f; color: #fff; }
.s-good  { background: #40916c; color: #fff; }
.s-ok    { background: rgba(210,153,29,.2); color: #d2991d; border: 2px solid #d2991d; }
.s-poor  { background: rgba(248,81,73,.2); color: #f85149; border: 2px solid #f85149; }
.grade { text-align: center; font-size: 1em; margin-bottom: 20px; color: var(--mu); }
.stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
.stat {
  background: var(--card); border: 1px solid var(--bd); border-radius: 6px;
  padding: 10px 18px; text-align: center; min-width: 80px;
}
.stat-num { font-size: 1.3em; font-weight: 700; }
.stat-label { font-size: .75em; color: var(--mu); }
.dim-section { margin-bottom: 16px; }
.dim-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--bd); font-size: 13px;
}
.dim-item:last-child { border: none; }
.dim-icon { font-size: 1em; width: 24px; text-align: center; flex-shrink: 0; }
.dim-name { width: 135px; font-weight: 500; flex-shrink: 0; }
.dim-score { width: 44px; text-align: right; font-weight: 600; flex-shrink: 0; }
.dim-bar { flex: 1; height: 5px; background: var(--dim-bar-bg); border-radius: 3px; overflow: hidden; }
.dim-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.dim-desc { font-size: 12px; color: var(--mu); padding: 2px 0 8px 34px; }
.sug { font-size: 12px; padding: 6px 10px; margin: 4px 0; border-radius: 4px; }
.sug.fix { background: rgba(248,81,73,.06); border-left: 2px solid var(--dn); }
.sug.good { background: rgba(63,185,80,.06); border-left: 2px solid var(--gn); }
.sug.tip { background: rgba(210,153,29,.06); border-left: 2px solid var(--or); }
.tabs { display: flex; gap: 2px; margin-bottom: 16px; }
.tab {
  padding: 8px 16px; border: none; background: transparent; color: var(--mu);
  cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent;
}
.tab.active { color: var(--ac); border-bottom-color: var(--ac); }
.hist-list { max-height: 400px; overflow-y: auto; }
.hist-row {
  display: flex; align-items: center; gap: 10px; padding: 10px;
  border-bottom: 1px solid var(--bd); cursor: pointer; font-size: 13px;
  transition: background .15s;
}
.hist-row:hover { background: var(--hover-bg); }
.hist-score { width: 50px; text-align: center; font-weight: 700; font-size: 1.1em; }
.hist-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-date { color: var(--mu); font-size: 11px; white-space: nowrap; }
.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  padding: 14px 28px; border-radius: 8px; font-size: 15px; font-weight: 600;
  z-index: 9999; pointer-events: none; opacity: 0; transition: opacity .3s;
}
.toast.show { opacity: 1; }
/* тФАтФА Mini survey тФАтФА */
.survey-card {
  margin-top: 16px; padding: 14px 18px; border-radius: 8px;

footer {

footer a { color: var(--ac); text-decoration: none; }
/* theme toggle */

  cursor: pointer; font-size: 16px; padding: 4px 8px; line-height: 1;
  transition: .2s; vertical-align: middle;

.theme-toggle:hover { background: var(--hover-bg); }

<script>

// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
// GEO Auditor v0.6.6 тАФ 14-dimension engine
// Language-agnostic, zero-config
// Agent API: window.GEOAuditor.detect(text)
// тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР

const ENTITY_PATTERNS = [
  /province|city|county|district|state|China|US|UK|Japan|Korea|India|Beijing|Shanghai|Shenzhen|Guangzhou|Hangzhou|Nanjing|Tokyo|London|NY|чЬБ|х╕В|хМ║|хО┐|ц▒ЯшЛП|ц╡Щц▒Я|х╣┐ф╕Ь|хМЧф║м|ф╕Кц╡╖|ц╖▒хЬ│|хНЧф║м|цЭнх╖Ю|х╣┐х╖Ю/,
  /company|corp|inc|ltd|group|university|institute|hospital|school|agency|хЕмхП╕|щЫЖхЫв|хдзхнж|хнжщЩв|хМ╗щЩв|хнжцаб|цЬ║цЮД|щГищЧи|хНХф╜Н|х╖ехОВ|хоЮщкМход/,
  /\d{4}х╣┤|\d{4}-\d{2}|since\s+\d{4}|for\s+\d+\s+years|хБЪф║Ж?\d+х╣┤|х╣▓ф║Ж?\d+х╣┤|\d+х╣┤.*ч╗ПщкМ/

const AI_FORBIDDEN = [
  /not.{0,15}but/gi, /isn't.{0,10}it's/gi, /not only.{0,10}but also/gi,
  /it.{0,10}goes without saying/gi, /ф╕НцШп.{0,15}шАМцШп/g, /х╣╢щЭЮ.{0,10}шАМцШп/g, /ф╕Нф╗ЕцШп.{0,10}цЫ┤цШп/g
];

const AI_WASTE = [
  'furthermore','moreover','consequently','nevertheless','in conclusion',
  'it is worth noting','it should be noted','as previously mentioned',
  'in summary','to summarize','as we can see','without a doubt',
  'undeniably','it is important to','one might argue',
  'цндхдЦ','шАМф╕Ф','хЫацнд','чД╢шАМ','ч╗╝ф╕КцЙАш┐░','хПпф╗ешп┤','хЬицЯРчзНчиЛх║жф╕К',
  'х╛Ах╛А','ф╕АхоЪчЪД','хА╝х╛Чц│ицДПчЪДцШп','цЫ┤ф╕║хЕ│щФочЪДцШп','цА╗шАМшиАф╣Л',
  'ф╝ЧцЙАхСичЯе','ф╕НхПпхРжшод','цпЛх║╕ч╜очЦС','цА╗чЪДцЭечЬЛ','цА╗чЪДцЭешо▓'
];

// RLHF / instruction-tuning voice patterns (research-backed)
const RLHF_SIGNALS = [
  [/here.{0,5}s how.{0,5}i.{0,5}d think about/gi, 'helpful_assistant', '"Here\'s how I\'d think about it" тАФ RLHF scaffold'],
  [/let me walk you through/gi, 'walkthrough', '"Let me walk you through" тАФ pedagogical AI voice'],
  [/on one hand.{0,80}on the other/gi, 'balanced_tradeoff', '"On one hand X, on the other Y" тАФ balanced framing'],
  [/great question|you.{0,3}re absolutely right/gi, 'sycophantic', '"Great question!" / "You\'re absolutely right!" тАФ sycophantic prefix'],
  [/as of my.{0,15}(?:training|knowledge).{0,10}cutoff/gi, 'cutoff_disclaimer', '"As of my training cutoff" тАФ knowledge disclaimer'],
  [/while.{0,20}has benefits.{0,30}also presents challenges/gi, 'diplomatic_tradeoff', 'Diplomatic framing of obvious tradeoffs'],
  [/happy to jump on a call|let me know if you have any questions|feel free to reach out/gi, 'templated_closer', 'Templated email/Slack closer'],
];

const STOPS = new Set([
  'the','a','an','is','are','was','were','be','been','in','on','at','to','for',
  'of','with','by','from','and','or','but','not','this','that','it','as',
  'чЪД','ф║Ж','хЬи','цШп','цИС','цЬЙ','хТМ','х░▒','ф╕Н','ф║║','щГ╜','ф╕А','ф╕к','ф╕К','ф╣Я',
  'х╛И','хИ░','шп┤','шжБ','хО╗','ф╜а','ф╝Ъ','чЭА','ц▓бцЬЙ','чЬЛ','хе╜','шЗкх╖▒','ш┐Щ','ф╗Ц',
  'хе╣','ф╗м','ш┐Ш','цКК','швл','шой','ч╗Щ','ф╗О','хРС','хп╣','ф╕О','ф╕║',
  'хРЧ','хСв','хРз','хХК','хУж','хЧп','ф╣И','щВг','ф╗Аф╣И','цАОф╣И'
]);

function countMatches(text, regex) {
  const m = text.match(regex);
  return m ? m.length : 0;
}

// Auto-extract topic phrases (handles EN word bigrams + CN char n-grams)
function extractTopicPhrases(text, topN) {
  topN = topN || 5;
  const clean = text.toLowerCase().replace(/[^\w\s\u4e00-\u9fff]/g, ' ');
  const cjkChars = (clean.match(/[\u4e00-\u9fff]/g) || []).length;
  const totalChars = clean.replace(/\s/g, '').length;
  const isCN = totalChars > 0 && cjkChars / totalChars > 0.4;

  let candidates = [];

  if (isCN && clean.length >= 8) {
    const cnText = clean.replace(/[^\u4e00-\u9fff]/g, '');
    for (let wlen of [4, 3, 2]) {
      const seen = {};
      for (let i = 0; i <= cnText.length - wlen; i++) {
        const chunk = cnText.substring(i, i + wlen);
        if (!STOPS.has(chunk)) seen[chunk] = (seen[chunk] || 0) + 1;
      }
      for (let [chunk, count] of Object.entries(seen)) {
        if (count >= 2) candidates.push([chunk, count]);
      }
    }
    // Filter substring overlaps: longer n-grams take priority
    candidates.sort((a, b) => b[0].length - a[0].length || b[1] - a[1]);
    let filtered = [];
    for (let [phrase, count] of candidates) {
      if (!filtered.some(([other]) => phrase !== other && other.includes(phrase))) {
        filtered.push([phrase, count]);
      }
    }
    candidates = filtered;
  } else {
    const words = clean.split(/\s+/).filter(w => w.length > 0);
    if (words.length >= 3) {
      const bigramCounts = {};
      for (let i = 0; i < words.length - 1; i++) {
        if (!STOPS.has(words[i]) && !STOPS.has(words[i+1])) {
          const bg = words[i] + ' ' + words[i+1];
          if (bg.replace(/\s/g, '').length >= 4) {
            bigramCounts[bg] = (bigramCounts[bg] || 0) + 1;
          }
        }
      }
      for (let [bg, count] of Object.entries(bigramCounts)) {
        if (count >= 2) candidates.push([bg, count]);
      }
    }
  }

  candidates.sort((a, b) => b[1] - a[1]);
  return candidates.slice(0, topN).map(c => c[0]);
}

function escRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// тФАтФА Core Detection Engine тФАтФА
function detect(text) {
  const cleanText = text.replace(/[^\w\s\u4e00-\u9fff]/g, ' ');
  const cnChars = (cleanText.match(/[\u4e00-\u9fff]/g) || []).length;
  const totalChars = Math.max(cleanText.replace(/\s/g, '').length, 1);
  const isCN = cnChars / totalChars > 0.4;
  const L = (en, zh) => isCN ? zh : en;
  const lines = text.split('\n');
  const firstLine = (lines[0] || '').trim();
  const title = firstLine && firstLine.length < 80 ? firstLine : '';
  const body = title ? lines.slice(1).join('\n') : text;
  const ft = text;
  let dims = [], total = 0, maxTotal = 100;

  // 1. Conclusion-First 10
  let firstPara = (body.trim().split('\n')[0] || '').substring(0, 120);
  let hasConclusion = /answer|conclusion|core|key|bottom.line|the.point|simply.put|heres.the.thing|чнФцбИ|ч╗Ушо║|ца╕х┐Г|хЕ│щФо|шп┤чЩ╜ф║Ж|шп┤чЬЯчЪД|чЫ┤цОе|х░▒цШп|ф╕АхПешпЭ/i.test(firstPara) && firstPara.length >= 25;
  let cf = hasConclusion ? 10 : firstPara.length >= 20 ? 6 : 2;
  dims.push({n:L('Conclusion-First','ч╗Ушо║хЙНч╜о'), s:cf, m:10, d:cf>=9?L('Clear opening','х╝АщЧишзБх▒▒'):cf>=5?L('Has intro but lead with answer next time','цЬЙх╝Ахд┤ф╜Жф╕НхдЯчЫ┤цОе'):L('Missing conclusion','ч╝║х░Сч╗Ушо║'), icon:'ЁЯУН'});
  total += cf;

  // 2. Data Anchors 10
  let nm = countMatches(ft, /\d+\.?\d*\s*(billion|million|thousand|hundred|%|USD|EUR|CNY|┬е|\$|тВм|kg|km|mm|cm|m|t|тДГ|┬░F|years|months|days|hours|times|users|people|ф║┐|ф╕З|хНГ|чЩ╛|хЕГ|хеЧ|ф╕к|цмб|х╣┤|цЬИ|цЧе|цЭб|хо╢|N┬╖m|kN|MPa|хРи)/gi);
  let sm = countMatches(ft, /reference|source|citation|standard|spec|according.to|reported.by|study|survey|research|data.from|хПВшАГ|цЭец║Р|цаЗхЗЖ|шзДшМГ|цНо.*цШ╛чд║|чмм.*цЭб/gi);
  let da = nm >= 4 && sm >= 2 ? 10 : nm >= 3 && sm >= 1 ? 8 : nm >= 3 ? 7 : nm >= 2 && sm >= 1 ? 6 : nm >= 2 ? 5 : sm >= 3 ? 4 : sm >= 1 ? 3 : nm >= 1 ? 2 : 0;
  dims.push({n:L('Data Anchors','цХ░цНощФЪчВ╣'), s:da, m:10, d:(da>=9?L('Excellent','ф╝ШчзА'):da>=5?L('Decent','ф╕НщФЩ'):L('Add numbers & sources','хКацХ░хнЧхТМцЭец║Р')) + ` (${nm} `+L('data pts','цХ░цНо')+` + ${sm} `+L('refs','х╝ХчФи')+`)`, icon:'ЁЯУК'});
  total += da;

  // 3. Structure 8
  let st = countMatches(body, /first|second|third|finally|step\s*\d|чмм[ф╕Аф║Мф╕ЙхЫЫф║ФхЕнф╕ГхЕлф╣ЭхНБ\d]|цнещкд|щжЦхЕИ|чД╢хРО|хЕ╢цмб|цЬАхРО|чммф╕А|чммф║М|чммф╕Й|\d+[\.уАБ\)]\s*\S/gi);
  let bu = countMatches(body, /^[\-\*тАв]\s/gm);
  let ss = st + bu >= 4 ? 8 : st + bu >= 2 ? 6 : st + bu >= 1 ? 3 : 1;
  dims.push({n:L('Structure','ч╗УцЮДх▒Вцмб'), s:ss, m:8, d:`${st} `+L('steps','цнещкд')+` + ${bu} `+L('bullets','хИЧшби')+`. ${ss>=7?L('Well structured','ч╗УцЮДц╕ЕцЩ░'):ss>=4?L('Has basic structure','цЬЙхЯ║цЬмч╗УцЮД'):L('Add steps or bullets','хКахИЖцнецИЦхИЧшби')}`, icon:'ЁЯФв'});
  total += ss;

  // 4. Comparison 8
  let cm = countMatches(ft, /vs|versus|compared|unlike|differs|difference|better.than|worse.than|rather.than|instead.of|хп╣цпФ|чЫ╕цпФ|ф╕НхРМф║О|хМ║хИл|х╖ох╝В|цпФ.*цЫ┤|шАМф╕НцШп|шАМщЭЮ|ф╝Шф║О|ф╕НхжВ/gi);
  let cmNum = countMatches(ft, /\d+\s*(%|degrees|times|years|days|хАН|х║ж).{0,30}\d+\s*(%|degrees|times|years|days|хАН|х║ж)/g);
  let totalCm = cm + cmNum;
  let cs = totalCm >= 3 ? 8 : totalCm >= 1 ? 5 : 2;
  dims.push({n:L('Comparison','хп╣цпФхИЖцЮР'), s:cs, m:8, d:`${totalCm} `+L('comparison(s)','хдДхп╣цпФ')+`. ${cs>=7?L('Strong','хп╣цпФхЕЕхИЖ'):cs>=4?L('Add more A vs B','хКацЫ┤хдЪхп╣цпФ'):L('Missing contrast','ч╝║х░Схп╣цпФ')}`, icon:'тЪЦя╕П'});
  total += cs;

  // 5. FAQ Module 8
  let qa = countMatches(body, /Q[я╝Ъ:]\s|A[я╝Ъ:]\s|Q&A|FAQ|щЧо[я╝Ъ:]|чнФ[я╝Ъ:]|х╕╕шзБщЧощвШ/gi);
  let qs = qa >= 4 ? 8 : qa >= 2 ? 6 : qa >= 1 ? 3 : 1;
  dims.push({n:L('FAQ Module','FAQцибхЭЧ'), s:qs, m:8, d:`${qa} `+L('Q&A pairs','ф╕кщЧочнФ')+`. ${qs>=6?L('Rich FAQ','FAQф╕░хпМ'):qs>=3?L('Has Q&A elements','цЬЙщЧочнФхЕГч┤а'):L('Add 2-3 Q&As','хКа2-3ф╕кщЧочнФ')}`, icon:'тЭУ'});
  total += qs;

  // 6. Title Quality 8
  let hk = title.length > 0,
      hi = /how|what|why|which|when|where|who|guide|tutorial|tips|цАОф╣И|хжВф╜Х|ф╗Аф╣И|хУк|ф╕║ф╗Аф╣И|хдЪх░С|хРЧ|цХЩчиЛ|цМЗхНЧ|цФ╗чХе|цЦ╣ц│Х|цКАх╖з|цбИф╛Л/i.test(title),
      hn = /\d/.test(title);
  let tq = hk && hi && hn ? 8 : hk && hi ? 6 : hk && hn ? 5 : hk ? 3 : 1;
  dims.push({n:L('Title Quality','цаЗщвШш┤ищЗП'), s:tq, m:8, d:tq>=7?L('Search intent + number тАФ ideal','цРЬч┤вцДПхЫ╛+цХ░хнЧя╝МчРЖцГ│'):tq>=5?L('Good, add a number','ф╕НщФЩя╝МхКаф╕кцХ░хнЧ'):tq>=2?L('Add search intent keywords','хКацРЬч┤вхЕ│щФошпН'):L('No valid title detected','цЬкцгАц╡ЛхИ░цЬЙцХИцаЗщвШ'), icon:'ЁЯУМ'});
  total += tq;

  // 7. Keyword Density 8 тАФ auto-extract topic words
  const topicPhrases = extractTopicPhrases(body);
  let kwScore = 0, kwTop = '';
  for (let phrase of topicPhrases) {
    const re = new RegExp(escRegex(phrase), 'gi');
    const c = (ft.match(re) || []).length;
    if (c >= 3) { kwScore = 8; kwTop = phrase; break; }
    else if (c >= 2 && kwScore < 6) { kwScore = 6; kwTop = phrase; }
    else if (c >= 1 && kwScore < 4) { kwScore = 4; kwTop = phrase; }
  }
  if (!kwScore) { kwScore = 2; kwTop = '(auto-detect failed)'; }
  dims.push({n:L('Keyword Density','хЕ│щФошпНхпЖх║ж'), s:kwScore, m:8, d:kwScore>=7?`"${kwTop}" well covered (тЙе3x)`:kwScore>=4?`"${kwTop}" sparse тАФ aim for 3-5x`:L('Topic keywords undetectable','цЬкцгАц╡ЛхИ░ф╕╗щвШшпН'), icon:'ЁЯФС'});
  total += kwScore;

  // 8. Paragraph Length 6
  let paras = body.split('\n\n').filter(p => p.trim());
  let avg = paras.reduce((s, p) => s + p.length, 0) / Math.max(paras.length, 1);
  let pl = avg >= 30 && avg <= 150 ? 6 : avg >= 15 && avg <= 300 ? 4 : 2;
  dims.push({n:L('Paragraph Length','цо╡шР╜щХ┐х║ж'), s:pl, m:6, d:`Avg ${Math.round(avg)} `+L('chars/para','хнЧ/цо╡')+`. ${pl>=5?L('Good rhythm','шКВхеПшИТщАВ'):pl>=3?L('A bit long/short','хБПщХ┐цИЦхБПчЯн'):L('Adjust paragraph length','ш░ГцХ┤цо╡шР╜щХ┐х║ж')}`, icon:'ЁЯУП'});
  total += pl;

  // 9. Sources 6
  let rf = countMatches(ft, /reference|source|citation|according.to|study|survey|published|reported|data.from|verified.by|link|хПВшАГ|цЭец║Р|х╝ХчФи|цНо.*цШ╛чд║|цгАц╡ЛцКехСК|ш░ГцЯе|чаФчй╢шбицШО/gi);
  let rs = rf >= 3 ? 6 : rf >= 1 ? 4 : 1;
  dims.push({n:L('Sources','х╝ХчФицЭец║Р'), s:rs, m:6, d:`${rf} `+L('traceable sources','хдДхПпш┐╜ц║пцЭец║Р')+`. ${rs>=5?L('Credible','хПпф┐б'):rs>=3?L('Has some','цЬЙф╕Аф║Ы'):L('Add citations','хКах╝ХчФицИЦцХ░цНоцЭец║Р')}`, icon:'ЁЯУЦ'});
  total += rs;

  // 10. CTA 4
  let ct = countMatches(ft, /subscribe|follow|share|comment|contact|reach.out|try|sign.up|download|learn.more|get.started|чзБф┐б|шБФч│╗|хТишпв|хЕ│ц│и|цЙлцПП|чВ╣хЗ╗|шпДшо║|хКах╛оф┐б|цЙУчФ╡шпЭ|шБКшБК/gi);
  let cc = ct >= 1 ? 4 : 1;
  dims.push({n:L('CTA','шбМхКихП╖хПм'), s:cc, m:4, d:ct>=1?L('Has call-to-action','цЬЙшбМхКихП╖хПм'):L('Add a CTA at the end','ч╗Ух░╛хКаCTA'), icon:'ЁЯОп'});
  total += cc;

  // 11. Entity Info 8
  let entScore = 0;
  for (let p of ENTITY_PATTERNS) { if (p.test(ft)) entScore++; }
  if (entScore >= 3) entScore = 8;
  else if (entScore >= 2) entScore = 6;
  else if (entScore >= 1) entScore = 3;
  else entScore = 1;
  dims.push({n:L('Entity Info','хоЮф╜Уф┐бцБп'), s:entScore, m:8, d:entScore>=6?L('Rich location/org/time info','хЬ░чВ╣/цЬ║цЮД/цЧ╢щЧ┤ф┐бцБпф╕░хпМ'):entScore>=3?L('Has basic entity info','цЬЙхЯ║цЬмхоЮф╜Уф┐бцБп'):L('Add location and organization names','хКахЬ░чВ╣хТМцЬ║цЮДхРНчз░'), icon:'ЁЯПв'});
  total += entScore;

  // 12. EEAT 8
  let eeat = 0;
  if (/\d+[\s\-]*(years|х╣┤).*(experience|ч╗ПщкМ|in\s|of\s)/i.test(ft)) eeat += 3;
  else if (/(хБЪф║Ж?|х╣▓ф║Ж?|ш╖Сш┐З|ф╗Оф╕Ъ|хЕешбМ|ф╗Оф║Л).{0,15}\d+\s*х╣┤|\d+\s*х╣┤.{0,15}(ч╗ПщкМ|ч╗ПхОЖ|ф╗Оф╕Ъ|хЕешбМ)/.test(ft)) eeat += 3;
  if (/certified|licensed|PhD|degree|expert|professional|шодшпБ|ш╡Дш┤и|ф╕Уф╕Ъ|х╖ечиЛх╕И|хНЪхгл|шпБф╣ж/i.test(ft)) eeat += 3;
  if (/reviewed|verified|tested|published|peer|audited|цгАц╡ЛцКехСК|хЮЛх╝ПцгАщкМ|чммф╕ЙцЦ╣|щкМшпБ|хобца╕|шодшпБ/i.test(ft)) eeat += 2;
  if (eeat >= 6) eeat = 8;
  else if (eeat >= 4) eeat = 6;
  else if (eeat >= 2) eeat = 4;
  else eeat = 2;
  dims.push({n:L('EEAT','EEATцЭГхиБ'), s:eeat, m:8, d:eeat>=7?L('Strong E-E-A-T signals','цЭГхиБф┐бхП╖х╝║'):eeat>=5?L('Decent authority','цЬЙф╕АхоЪцЭГхиБ'):L('Add experience/credentials/citations','хКач╗ПщкМ/ш╡Дш┤и/х╝ХчФи'), icon:'ЁЯЫбя╕П'});
  total += eeat;

  // 13. Semantic Match 4
  let sem = 0;
  if (/how|what|why|which|when|where|who|цАОф╣И|хжВф╜Х|ф╗Аф╣И|хУк|ф╕║ф╗Аф╣И|хдЪх░С|хРЧ/i.test(title)) sem += 2;
  if (/because|therefore|reason|answer|key|core|хЫаф╕║|цЙАф╗е|хОЯхЫа|чнФцбИ|хЕ│щФо|ца╕х┐Г/i.test(body.substring(0, 200))) sem += 2;
  dims.push({n:L('Semantic Match','шпнф╣ЙхМ╣щЕН'), s:sem, m:4, d:sem>=3?L('Title-content intent aligned','цаЗщвШхТМхЖЕхо╣ф╕АшЗ┤'):sem>=1?L('Partial match','щГихИЖхМ╣щЕН'):L('Title and content mismatch','цаЗщвШхТМхЖЕхо╣ф╕НхМ╣щЕН'), icon:'ЁЯОп'});
  total += sem;

  // 14. Anti-AI Voice 4 тАФ research-backed 6-signal detection
  // DESIGN BOUNDARY: GEO-positive structures (comparisons, FAQ, lists) are NOT penalized.
  // Only targets: pure AI vocabulary, RLHF voice, punctuation fingerprints, burstiness deficit.
  
  // Signal A: AI template patterns (forbidden constructions)
  let aiHits = 0;
  for (let p of AI_FORBIDDEN) { aiHits += (ft.match(p) || []).length; }
  
  // Signal B: Banned vocabulary (research-backed, EN+CN)
  for (let w of AI_WASTE) {
    aiHits += (ft.match(new RegExp(escRegex(w), 'gi')) || []).length;
  }
  
  // Signal C: RLHF / instruction-tuning voice (2025-2026 research)
  let rlhfHits = 0;
  for (let [pat] of RLHF_SIGNALS) {
    rlhfHits += (ft.match(pat) || []).length;
  }
  aiHits += rlhfHits;
  
  // Signal D: Sentence diversity + burstiness
  let sents = body.split(/[.!?уАВя╝Бя╝Я\n]/).map(s => s.trim()).filter(s => s.length > 10);
  let sentLengths = sents.map(s => s.split(/\s+/).length);
  
  let burstiness = 0.0;
  if (sentLengths.length >= 4) {
    let meanLen = sentLengths.reduce((a, b) => a + b, 0) / sentLengths.length;
    let variance = sentLengths.reduce((s, l) => s + (l - meanLen) ** 2, 0) / sentLengths.length;
    burstiness = Math.round(Math.sqrt(variance) * 10) / 10;
  }
  
  // Simple declarative ratio (bias toward simple-sentence patterns)
  let simpleDecl = sents.filter(s => /^.{0,5}(цШп|is|are|was|were)\b/.test(s)).length;
  let sentDiversity = 1.0;
  if (sents.length >= 4) {
    let simpleRatio = simpleDecl / sents.length;
    sentDiversity = Math.max(0.3, 1.0 - simpleRatio);
  }
  
  // Signal E: Paragraph opener repetition
  let paraOpeners = [];
  for (let p of paras) {
    let opener = p.trim().substring(0, 15).replace(/[я╝М,.уАВ!я╝Б?я╝Я\n]+$/, '');
    if (opener) paraOpeners.push(opener);
  }
  let openerRepeats = 0;
  if (paraOpeners.length >= 3) {
    let oc = {};
    paraOpeners.forEach(o => oc[o] = (oc[o] || 0) + 1);
    openerRepeats = Object.values(oc).reduce((s, c) => s + (c > 1 ? c - 1 : 0), 0);
  }
  
  // Signal F: Punctuation fingerprints (research-validated)
  let emDashCount = (ft.match(/[тАФтАУ]/g) || []).length;
  let emDashDensity = Math.round(emDashCount / Math.max(ft.length, 1) * 500 * 10) / 10;
  let semicolonCount = (ft.match(/;/g) || []).length;
  let curlyQuotes = (ft.match(/[\u201c\u201d\u2018\u2019]/g) || []).length;
  let punctScore = 1.0;  // 1.0 = clean, 0.0 = heavy AI punctuation
  if (emDashDensity > 2) punctScore -= 0.3;
  if (semicolonCount > 3) punctScore -= 0.3;
  if (curlyQuotes > 2) punctScore -= 0.4;
  punctScore = Math.max(0.0, punctScore);
  
  // Score synthesis (6 signals)
  let deai;
  if (sents.length < 4 || body.trim().length < 80) {
    // Insufficient signal: cap at 3/4, note uncertainty
    deai = sents.length >= 1 ? 3 : 2;
  } else {
    deai = 4;
    if (aiHits > 5) deai -= 2;
    else if (aiHits > 2) deai -= 1;
    if (burstiness < 5 && sentLengths.length >= 4) deai -= 1;  // SD < 5 = metronomic
    if (sentDiversity < 0.5) deai -= 1;
    if (openerRepeats > 2) deai -= 1;
    if (punctScore < 0.4) deai -= 1;
  }
  deai = Math.max(0, deai);
  
  // Diagnosis string
  let reasons = [];
  if (aiHits > 0) reasons.push(`${aiHits} AI-tells`);
  if (burstiness < 5 && sentLengths.length >= 4)
    reasons.push(`burstiness=${burstiness}${burstiness > 0 ? '(low)' : '(uniform)'}`);
  if (sentDiversity < 0.7) reasons.push(`diversity=${sentDiversity.toFixed(2)}`);
  if (openerRepeats > 0) reasons.push(`${openerRepeats} repeated openers`);
  if (punctScore < 0.7) reasons.push(`punct=${punctScore.toFixed(2)}`);
  
  let deaiD = deai >= 4 ? 'Clean human voice' :
              deai >= 3 ? 'Minor signals: ' + reasons.join(', ') :
              deai >= 1 ? 'Mixed signals: ' + reasons.join(', ') :
              'Heavy AI voice: ' + reasons.join(', ');
  
  dims.push({n:L('Anti-AI Voice','хО╗AIшЕФ'), s:deai, m:4, d:deaiD, icon:'ЁЯдЦ'});
  total += deai;

  let pct = Math.round(total / maxTotal * 100);
  let grade = pct >= 85 ? 'S' : pct >= 70 ? 'A' : pct >= 50 ? 'B' : 'C';
  let circleCls = grade === 'S' ? 's-great' : grade === 'A' ? 's-good' : grade === 'B' ? 's-ok' : 's-poor';
  let sugg = [];
  dims.forEach(d => { if (d.s / d.m < 0.5) sugg.push({t:'fix', m:`${d.n} low: ${d.d}`}); });
  if (sugg.length < 2) sugg.push({t:'good', m:L('Overall GEO-friendly. Keep publishing.','цХ┤ф╜УGEOхПЛхе╜х║жшЙпхе╜уАВ')});

  return { title, total, maxTotal, pct, grade, circleCls, dims, sugg, 
           textLength: ft.length, paraCount: paras.length, avgParaLen: Math.round(avg), dataCount: nm,
           voice_details: { ai_word_count: aiHits, rlhf_signals: rlhfHits, burstiness, 
                            sentence_diversity: Math.round(sentDiversity * 100) / 100,
                            sentence_count: sents.length, opener_repeats: openerRepeats,
                            simple_declarative_pct: Math.round(simpleDecl / Math.max(sents.length, 1) * 100),
                            punctuation: { em_dash_count: emDashCount, em_dash_per_500_chars: emDashDensity,
                                           semicolon_count: semicolonCount, curly_quote_count: curlyQuotes,
                                           punct_score: Math.round(punctScore * 100) / 100 } } };
}

// тФАтФА Render тФАтФА
function runCheck() { document.getElementById("resultContent").innerHTML="<p style='text-align:center;padding:20px;color:var(--mu)'>цгАц╡Лф╕н...</p>";document.getElementById("resultPanel").style.display="block";
  const text = document.getElementById('contentInput').value.trim();

  const r = detect(text);

// тФАтФА Survey (pops once after 3rd detection, never again) тФАтФА
const SURVEY_KEY = 'geo_auditor_survey_done';
const SURVEY_THRESHOLD = 3;

function maybeShowSurvey() {
  if (localStorage.getItem(SURVEY_KEY)) return;
  let cnt = parseInt(localStorage.getItem('geo_auditor_run_count') || '0');
  cnt++;
  localStorage.setItem('geo_auditor_run_count', cnt);
  if (cnt >= SURVEY_THRESHOLD) {
    document.getElementById('surveyCard').style.display = 'block';
    document.getElementById('surveyCard').scrollIntoView({behavior: 'smooth'});
  }
}

function submitSurvey() {
  const q1 = document.querySelector('input[name="q1"]:checked');
  const q2 = document.querySelector('input[name="q2"]:checked');
  if (!q1 || !q2) { toast('Please answer both questions'); return; }
  // Log locally (no server тАФ privacy-first)
  const surveys = JSON.parse(localStorage.getItem('geo_auditor_surveys') || '[]');
  surveys.push({q1: q1.value, q2: q2.value, ts: new Date().toISOString()});
  localStorage.setItem('geo_auditor_surveys', JSON.stringify(surveys));
  localStorage.setItem(SURVEY_KEY, '1');
  document.getElementById('surveyCard').innerHTML = '<p style="color:#3fb950">тЬУ Thanks! Your input shapes what we build next.</p>';
}

function dismissSurvey() {
  localStorage.setItem(SURVEY_KEY, '1');
  document.getElementById('surveyCard').style.display = 'none';
}

function renderResult(r) {
  const gradeLabels={'S':L('ЁЯПЖ Excellent','ЁЯПЖ ф╝ШчзА'),'A':L('тЬЕ Good','тЬЕ шЙпхе╜'),'B':L('тЪая╕П Needs Work','тЪая╕П щЬАцФ╣ш┐Ы'),'C':L('тЭМ Rewrite','тЭМ щЗНхЖЩ')};
  let html = `
    <div class="${r.circleCls} score-circle">${r.pct}%</div>
    <div class="grade">${gradeLabels[r.grade]} ┬╖ ${r.total}/${r.maxTotal} pts</div>
    <div class="stats">
      <div class="stat"><div class="stat-num">${r.textLength}</div><div class="stat-label">Chars</div></div>
      <div class="stat"><div class="stat-num">${r.paraCount}</div><div class="stat-label">Paras</div></div>
      <div class="stat"><div class="stat-num">${r.avgParaLen}</div><div class="stat-label">Avg Len</div></div>
      <div class="stat"><div class="stat-num">${r.dataCount}</div><div class="stat-label">Data Pts</div></div>
    </div>
    ${r.dims.map(di => `
      <div class="dim-item">
        <span class="dim-icon">${di.icon}</span>
        <span class="dim-name">${di.n}</span>
        <div class="dim-bar"><div class="dim-fill" style="width:${di.s/di.m*100}%;background:${di.s/di.m>=0.7?'#3fb950':di.s/di.m>=0.4?'#d2991d':'#f85149'}"></div></div>
        <span class="dim-score">${di.s}/${di.m}</span>
      </div>
      <div class="dim-desc">${di.d}</div>
    `).join('')}
    <h4 style="margin-top:16px;font-size:14px;color:#fff">ЁЯТб Suggestions</h4>
    ${r.sugg.map(s => `<div class="sug ${s.t}">${s.m}</div>`).join('')}
  `;
  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('resultPanel').scrollIntoView({behavior: 'smooth'});
}

// тФАтФА Copy (AI Rewrite Prompt for external users) тФАтФА
function copyResult() {
  if (!window._lastResult) return;
  const r = window._lastResult;
  const text = document.getElementById('contentInput').value.trim();
  const weakDims = r.dims.filter(d => d.s / d.m < 0.6);
  const fixes = r.sugg.filter(s => s.t === 'fix');
  const lang = _isCN ? 'zh' : 'en';

  let prompt = '';
  if (lang === 'zh') {
    prompt = `ф╜ацШпф╕Аф╕кGEOф╝ШхМЦф╕Ухо╢уАВф╗еф╕ЛцШпщЬАшжБцФ╣хЖЩчЪДцЦЗчлая╝Их╜УхЙНGEOх╛ЧхИЖ ${r.pct}/100я╝М${r.grade}ч║зя╝Йя╝Ъ\n\n---хОЯцЦЗ---\n${text}\n---хОЯцЦЗхоМ---\n\nх╝▒щб╣ч╗┤х║жя╝Ъ\n`;
    weakDims.forEach(d => { prompt += `- ${d.n} (${d.s}/${d.m}): ${d.d}\n`; });
    prompt += `\nцФ╣хЖЩшжБц▒Вя╝Ъ\n`;

function clearInput() {
  document.getElementById('contentInput').value = '';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';
}

// тФАтФА Tabs тФАтФА
function showTab(t, evt) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  if (evt) evt.target.classList.add('active');
  document.getElementById('checkPanel').style.display = t === 'check' ? 'block' : 'none';
  document.getElementById('historyPanel').style.display = t === 'history' ? 'block' : 'none';
  if (t === 'history') loadHistory();
}

// тФАтФА History (localStorage) тФАтФА
const HIST_KEY = 'geo_auditor_history_v2';
const MAX_HIST = 50;

function saveToHistory(r) {
  const text = document.getElementById('contentInput').value.trim();
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) { hist = []; }
  hist.unshift({
    id: Date.now(),
    title: (r.title || '(no title)').substring(0, 60),
    score: r.pct,
    grade: r.grade,
    time: new Date().toLocaleString(),
    text: text.substring(0, 5000),
    dims: r.dims.map(d => ({n: d.n, s: d.s, m: d.m, icon: d.icon}))
  });
  if (hist.length > MAX_HIST) hist = hist.slice(0, MAX_HIST);
  try {
    localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  } catch(e) {
    hist = hist.slice(0, 25);
    localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  }
}

function loadHistory() {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
  const el = document.getElementById('histList');
  if (!hist.length) { el.innerHTML = '<p style="color:var(--mu);text-align:center;padding:30px">No history yet</p>'; return; }
  el.innerHTML = hist.map(r => {
    let clr = r.score >= 85 ? '#3fb950' : r.score >= 70 ? '#58a6ff' : r.score >= 50 ? '#d2991d' : '#f85149';
    return `<div class="hist-row" onclick="viewHistory(${r.id})">
      <span class="hist-score" style="color:${clr}">${r.score}%</span>
      <span class="hist-title">${esc(r.title)}</span>
      <span class="hist-date">${r.time}</span>
    </div>`;
  }).join('');
}

function viewHistory(id) {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
  const entry = hist.find(h => h.id === id);
  if (!entry) return;
  document.getElementById('contentInput').value = entry.text;
  let r = detect(entry.text);
  renderResult(r);
  document.getElementById('copyBtn').style.display = 'inline-flex';
  window._lastResult = r;
  showTab('check');
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.querySelectorAll('.tab')[1].classList.remove('active');
  document.getElementById('checkPanel').style.display = 'block';
  document.getElementById('historyPanel').style.display = 'none';
}

function clearHistory() {
  if (confirm('Clear all detection history?')) {
    localStorage.removeItem(HIST_KEY);
    loadHistory();
    toast('History cleared');
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2000);
}
