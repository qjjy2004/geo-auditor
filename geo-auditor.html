.btn-ac { background: var(--ac); color: #fff; }

.btn-out {

.btn-sm { padding: 5px 12px; font-size: 12px; }

.dim-icon { font-size: 1em; width: 24px; text-align: center; flex-shrink: 0; }
.dim-name { width: 135px; font-weight: 500; flex-shrink: 0; }

.dim-bar { flex: 1; height: 5px; background: var(--dim-bar-bg); border-radius: 3px; overflow: hidden; }

const ENTITY_PATTERNS = [

const STOPS = new Set([

function countMatches(text, regex) {
  const m = text.match(regex);
  return m ? m.length : 0;
}

// Auto-extract topic phrases (handles EN word bigrams + CN char n-grams)
function extractTopicPhrases(text, topN) {
  topN = topN || 5;
  const clean = text.toLowerCase().replace(/[^\w\s\u4e00-\u9fff]/g, ' ');
  const cjkChars = (clean.match(/[\u4e00-\u9fff]/g) || []).length;
  const totalChars = clean.replace(/\s/g, '').length;
  const isCN = totalChars > 0 && cjkChars / totalChars > 0.4;

  let candidates = [];

  if (isCN && clean.length >= 8) {
    const cnText = clean.replace(/[^\u4e00-\u9fff]/g, '');
    for (let wlen of [4, 3, 2]) {
      const seen = {};
      for (let i = 0; i <= cnText.length - wlen; i++) {
        const chunk = cnText.substring(i, i + wlen);
        if (!STOPS.has(chunk)) seen[chunk] = (seen[chunk] || 0) + 1;
      }
      for (let [chunk, count] of Object.entries(seen)) {
        if (count >= 2) candidates.push([chunk, count]);
      }
    }
    // Filter substring overlaps: longer n-grams take priority
    candidates.sort((a, b) => b[0].length - a[0].length || b[1] - a[1]);
    let filtered = [];
    for (let [phrase, count] of candidates) {
      if (!filtered.some(([other]) => phrase !== other && other.includes(phrase))) {
        filtered.push([phrase, count]);
      }
    }
    candidates = filtered;
  } else {
    const words = clean.split(/\s+/).filter(w => w.length > 0);
    if (words.length >= 3) {
      const bigramCounts = {};
      for (let i = 0; i < words.length - 1; i++) {
        if (!STOPS.has(words[i]) && !STOPS.has(words[i+1])) {
          const bg = words[i] + ' ' + words[i+1];
          if (bg.replace(/\s/g, '').length >= 4) {
            bigramCounts[bg] = (bigramCounts[bg] || 0) + 1;
          }
        }
      }
      for (let [bg, count] of Object.entries(bigramCounts)) {
        if (count >= 2) candidates.push([bg, count]);
      }
    }
  }

  candidates.sort((a, b) => b[1] - a[1]);
  return candidates.slice(0, topN).map(c => c[0]);
}

function escRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ‚ĒÄ‚ĒÄ Core Detection Engine ‚ĒÄ‚ĒÄ
function detect(text) {
  const cleanText = text.replace(/[^\w\s\u4e00-\u9fff]/g, ' ');
  const cnChars = (cleanText.match(/[\u4e00-\u9fff]/g) || []).length;
  const totalChars = Math.max(cleanText.replace(/\s/g, '').length, 1);
  const isCN = cnChars / totalChars > 0.4;
  const L = (en, zh) => isCN ? zh : en;
  const lines = text.split('\n');
  const firstLine = (lines[0] || '').trim();
  const title = firstLine && firstLine.length < 80 ? firstLine : '';
  const body = title ? lines.slice(1).join('\n') : text;
  const ft = text;
  let dims = [], total = 0, maxTotal = 100;

  // 1. Conclusion-First 10
  let firstPara = (body.trim().split('\n')[0] || '').substring(0, 120);
  let hasConclusion = /answer|conclusion|core|key|bottom.line|the.point|simply.put|heres.the.thing|Á≠Ēś°ą|ÁĽďŤģļ|ś†łŚŅÉ|ŚÖ≥ťĒģ|ŤĮīÁôĹšļÜ|ŤĮīÁúüÁöĄ|Áõīśé•|ŚįĪśėĮ|šłÄŚŹ•ŤĮĚ/i.test(firstPara) && firstPara.length >= 25;
  let cf = hasConclusion ? 10 : firstPara.length >= 20 ? 6 : 2;
  dims.push({n:L('Conclusion-First','ÁĽďŤģļŚČćÁĹģ'), s:cf, m:10, d:cf>=9?L('Clear opening','ŚľÄťó®ŤßĀŚĪĪ'):cf>=5?L('Has intro but lead with answer next time','śúČŚľÄŚ§īšĹÜšłćŚ§üÁõīśé•'):L('Missing conclusion','ÁľļŚįĎÁĽďŤģļ'), icon:'ūüďć'});
  total += cf;

  // 2. Data Anchors 10
  let nm = countMatches(ft, /\d+\.?\d*\s*(billion|million|thousand|hundred|%|USD|EUR|CNY|¬•|\$|‚ā¨|kg|km|mm|cm|m|t|‚ĄÉ|¬įF|years|months|days|hours|times|users|people|šļŅ|šłá|ŚćÉ|Áôĺ|ŚÖÉ|Ś•ó|šł™|ś¨°|ŚĻī|śúą|śó•|śĚ°|Śģ∂|N¬∑m|kN|MPa|Śź®)/gi);
  let sm = countMatches(ft, /reference|source|citation|standard|spec|according.to|reported.by|study|survey|research|data.from|ŚŹāŤÄÉ|śĚ•śļź|ś†áŚáÜ|ŤßĄŤĆÉ|śćģ.*śėĺÁ§ļ|Á¨¨.*śĚ°/gi);
  let da = nm >= 4 && sm >= 2 ? 10 : nm >= 3 && sm >= 1 ? 8 : nm >= 3 ? 7 : nm >= 2 && sm >= 1 ? 6 : nm >= 2 ? 5 : sm >= 3 ? 4 : sm >= 1 ? 3 : nm >= 1 ? 2 : 0;
  dims.push({n:L('Data Anchors','śēįśćģťĒöÁāĻ'), s:da, m:10, d:(da>=9?L('Excellent','šľėÁßÄ'):da>=5?L('Decent','šłćťĒô'):L('Add numbers & sources','Śä†śēįŚ≠óŚíĆśĚ•śļź')) + ` (${nm} `+L('data pts','śēįśćģ')+` + ${sm} `+L('refs','ŚľēÁĒ®')+`)`, icon:'ūüďä'});
  total += da;

  // 3. Structure 8
  let st = countMatches(body, /first|second|third|finally|step\s*\d|Á¨¨[šłÄšļĆšłČŚõõšļĒŚÖ≠šłÉŚÖęšĻĚŚćĀ\d]|ś≠•ť™§|ť¶ĖŚÖą|ÁĄ∂Śźé|ŚÖ∂ś¨°|śúÄŚźé|Á¨¨šłÄ|Á¨¨šļĆ|Á¨¨šłČ|\d+[\.„ÄĀ\)]\s*\S/gi);
  let bu = countMatches(body, /^[\-\*‚ÄĘ]\s/gm);
  let ss = st + bu >= 4 ? 8 : st + bu >= 2 ? 6 : st + bu >= 1 ? 3 : 1;
  dims.push({n:L('Structure','ÁĽďśěĄŚĪāś¨°'), s:ss, m:8, d:`${st} `+L('steps','ś≠•ť™§')+` + ${bu} `+L('bullets','ŚąóŤ°®')+`. ${ss>=7?L('Well structured','ÁĽďśěĄśłÖśôį'):ss>=4?L('Has basic structure','śúČŚüļśú¨ÁĽďśěĄ'):L('Add steps or bullets','Śä†ŚąÜś≠•śąĖŚąóŤ°®')}`, icon:'ūüĒĘ'});
  total += ss;

  // 4. Comparison 8
  let cm = countMatches(ft, /vs|versus|compared|unlike|differs|difference|better.than|worse.than|rather.than|instead.of|ŚĮĻśĮĒ|ÁõłśĮĒ|šłćŚźĆšļé|ŚĆļŚąę|Ś∑ģŚľā|śĮĒ.*śõī|ŤÄĆšłćśėĮ|ŤÄĆťĚě|šľėšļé|šłćŚ¶ā/gi);
  let cmNum = countMatches(ft, /\d+\s*(%|degrees|times|years|days|ŚÄć|Śļ¶).{0,30}\d+\s*(%|degrees|times|years|days|ŚÄć|Śļ¶)/g);
  let totalCm = cm + cmNum;
  let cs = totalCm >= 3 ? 8 : totalCm >= 1 ? 5 : 2;
  dims.push({n:L('Comparison','ŚĮĻśĮĒŚąÜśěź'), s:cs, m:8, d:`${totalCm} `+L('comparison(s)','Ś§ĄŚĮĻśĮĒ')+`. ${cs>=7?L('Strong','ŚĮĻśĮĒŚÖÖŚąÜ'):cs>=4?L('Add more A vs B','Śä†śõīŚ§öŚĮĻśĮĒ'):L('Missing contrast','ÁľļŚįĎŚĮĻśĮĒ')}`, icon:'‚öĖÔłŹ'});
  total += cs;

  // 5. FAQ Module 8
  let qa = countMatches(body, /Q[Ôľö:]\s|A[Ôľö:]\s|Q&A|FAQ|ťóģ[Ôľö:]|Á≠Ē[Ôľö:]|ŚłłŤßĀťóģťĘė/gi);
  let qs = qa >= 4 ? 8 : qa >= 2 ? 6 : qa >= 1 ? 3 : 1;
  dims.push({n:L('FAQ Module','FAQś®°ŚĚó'), s:qs, m:8, d:`${qa} `+L('Q&A pairs','šł™ťóģÁ≠Ē')+`. ${qs>=6?L('Rich FAQ','FAQšłįŚĮĆ'):qs>=3?L('Has Q&A elements','śúČťóģÁ≠ĒŚÖÉÁī†'):L('Add 2-3 Q&As','Śä†2-3šł™ťóģÁ≠Ē')}`, icon:'‚Ěď'});
  total += qs;

  // 6. Title Quality 8
  let hk = title.length > 0,
      hi = /how|what|why|which|when|where|who|guide|tutorial|tips|śÄéšĻą|Ś¶āšĹē|šĽÄšĻą|Śď™|šłļšĽÄšĻą|Ś§öŚįĎ|Śźó|śēôÁ®č|śĆáŚćó|śĒĽÁē•|śĖĻś≥ē|śäÄŚ∑ß|ś°ąšĺč/i.test(title),
      hn = /\d/.test(title);
  let tq = hk && hi && hn ? 8 : hk && hi ? 6 : hk && hn ? 5 : hk ? 3 : 1;
  dims.push({n:L('Title Quality','ś†áťĘėŤī®ťáŹ'), s:tq, m:8, d:tq>=7?L('Search intent + number ‚ÄĒ ideal','śźúÁīĘśĄŹŚõĺ+śēįŚ≠óÔľĆÁźÜśÉ≥'):tq>=5?L('Good, add a number','šłćťĒôÔľĆŚä†šł™śēįŚ≠ó'):tq>=2?L('Add search intent keywords','Śä†śźúÁīĘŚÖ≥ťĒģŤĮć'):L('No valid title detected','śú™ś£ÄśĶčŚąįśúČśēąś†áťĘė'), icon:'ūüďĆ'});
  total += tq;

  // 7. Keyword Density 8 ‚ÄĒ auto-extract topic words
  const topicPhrases = extractTopicPhrases(body);
  let kwScore = 0, kwTop = '';
  for (let phrase of topicPhrases) {
    const re = new RegExp(escRegex(phrase), 'gi');
    const c = (ft.match(re) || []).length;
    if (c >= 3) { kwScore = 8; kwTop = phrase; break; }
    else if (c >= 2 && kwScore < 6) { kwScore = 6; kwTop = phrase; }
    else if (c >= 1 && kwScore < 4) { kwScore = 4; kwTop = phrase; }
  }
  if (!kwScore) { kwScore = 2; kwTop = '(auto-detect failed)'; }
  dims.push({n:L('Keyword Density','ŚÖ≥ťĒģŤĮćŚĮÜŚļ¶'), s:kwScore, m:8, d:kwScore>=7?`"${kwTop}" well covered (‚Č•3x)`:kwScore>=4?`"${kwTop}" sparse ‚ÄĒ aim for 3-5x`:L('Topic keywords undetectable','śú™ś£ÄśĶčŚąįšłĽťĘėŤĮć'), icon:'ūüĒĎ'});
  total += kwScore;

  // 8. Paragraph Length 6
  let paras = body.split('\n\n').filter(p => p.trim());
  let avg = paras.reduce((s, p) => s + p.length, 0) / Math.max(paras.length, 1);
  let pl = avg >= 30 && avg <= 150 ? 6 : avg >= 15 && avg <= 300 ? 4 : 2;
  dims.push({n:L('Paragraph Length','śģĶŤźĹťēŅŚļ¶'), s:pl, m:6, d:`Avg ${Math.round(avg)} `+L('chars/para','Ś≠ó/śģĶ')+`. ${pl>=5?L('Good rhythm','ŤäāŚ•ŹŤąíťÄā'):pl>=3?L('A bit long/short','ŚĀŹťēŅśąĖŚĀŹÁü≠'):L('Adjust paragraph length','ŤįÉśēīśģĶŤźĹťēŅŚļ¶')}`, icon:'ūüďŹ'});
  total += pl;

  // 9. Sources 6
  let rf = countMatches(ft, /reference|source|citation|according.to|study|survey|published|reported|data.from|verified.by|link|ŚŹāŤÄÉ|śĚ•śļź|ŚľēÁĒ®|śćģ.*śėĺÁ§ļ|ś£ÄśĶčśä•ŚĎä|ŤįÉśü•|Á†ĒÁ©∂Ť°®śėé/gi);
  let rs = rf >= 3 ? 6 : rf >= 1 ? 4 : 1;
  dims.push({n:L('Sources','ŚľēÁĒ®śĚ•śļź'), s:rs, m:6, d:`${rf} `+L('traceable sources','Ś§ĄŚŹĮŤŅĹśļĮśĚ•śļź')+`. ${rs>=5?L('Credible','ŚŹĮšŅ°'):rs>=3?L('Has some','śúČšłÄšļõ'):L('Add citations','Śä†ŚľēÁĒ®śąĖśēįśćģśĚ•śļź')}`, icon:'ūüďĖ'});
  total += rs;

  // 10. CTA 4
  let ct = countMatches(ft, /subscribe|follow|share|comment|contact|reach.out|try|sign.up|download|learn.more|get.started|ÁßĀšŅ°|ŤĀĒÁ≥Ľ|Śí®ŤĮĘ|ŚÖ≥ś≥®|śČęśŹŹ|ÁāĻŚáĽ|ŤĮĄŤģļ|Śä†ŚĺģšŅ°|śČďÁĒĶŤĮĚ|ŤĀäŤĀä/gi);
  let cc = ct >= 1 ? 4 : 1;
  dims.push({n:L('CTA','Ť°ĆŚä®ŚŹ∑ŚŹ¨'), s:cc, m:4, d:ct>=1?L('Has call-to-action','śúČŤ°ĆŚä®ŚŹ∑ŚŹ¨'):L('Add a CTA at the end','ÁĽďŚįĺŚä†CTA'), icon:'ūüéĮ'});
  total += cc;

  // 11. Entity Info 8
  let entScore = 0;
  for (let p of ENTITY_PATTERNS) { if (p.test(ft)) entScore++; }
  if (entScore >= 3) entScore = 8;
  else if (entScore >= 2) entScore = 6;
  else if (entScore >= 1) entScore = 3;
  else entScore = 1;
  dims.push({n:L('Entity Info','ŚģěšĹďšŅ°śĀĮ'), s:entScore, m:8, d:entScore>=6?L('Rich location/org/time info','ŚúįÁāĻ/śúļśěĄ/śó∂ťóīšŅ°śĀĮšłįŚĮĆ'):entScore>=3?L('Has basic entity info','śúČŚüļśú¨ŚģěšĹďšŅ°śĀĮ'):L('Add location and organization names','Śä†ŚúįÁāĻŚíĆśúļśěĄŚźćÁßį'), icon:'ūüŹĘ'});
  total += entScore;

  // 12. EEAT 8
  let eeat = 0;
  if (/\d+[\s\-]*(years|ŚĻī).*(experience|ÁĽŹť™Ć|in\s|of\s)/i.test(ft)) eeat += 3;
  else if (/(ŚĀöšļÜ?|ŚĻ≤šļÜ?|Ť∑ĎŤŅá|šĽéšłö|ŚÖ•Ť°Ć|šĽéšļč).{0,15}\d+\s*ŚĻī|\d+\s*ŚĻī.{0,15}(ÁĽŹť™Ć|ÁĽŹŚéÜ|šĽéšłö|ŚÖ•Ť°Ć)/.test(ft)) eeat += 3;
  if (/certified|licensed|PhD|degree|expert|professional|Ťģ§ŤĮĀ|ŤĶĄŤī®|šłďšłö|Ś∑•Á®čŚłą|ŚćöŚ£ę|ŤĮĀšĻ¶/i.test(ft)) eeat += 3;
  if (/reviewed|verified|tested|published|peer|audited|ś£ÄśĶčśä•ŚĎä|ŚěčŚľŹś£Äť™Ć|Á¨¨šłČśĖĻ|ť™ĆŤĮĀ|Śģ°ś†ł|Ťģ§ŤĮĀ/i.test(ft)) eeat += 2;
  if (eeat >= 6) eeat = 8;
  else if (eeat >= 4) eeat = 6;
  else if (eeat >= 2) eeat = 4;
  else eeat = 2;
  dims.push({n:L('EEAT','EEATśĚÉŚ®Ā'), s:eeat, m:8, d:eeat>=7?L('Strong E-E-A-T signals','śĚÉŚ®ĀšŅ°ŚŹ∑Śľļ'):eeat>=5?L('Decent authority','śúČšłÄŚģöśĚÉŚ®Ā'):L('Add experience/credentials/citations','Śä†ÁĽŹť™Ć/ŤĶĄŤī®/ŚľēÁĒ®'), icon:'ūüõ°ÔłŹ'});
  total += eeat;

  // 13. Semantic Match 4
  let sem = 0;
  if (/how|what|why|which|when|where|who|śÄéšĻą|Ś¶āšĹē|šĽÄšĻą|Śď™|šłļšĽÄšĻą|Ś§öŚįĎ|Śźó/i.test(title)) sem += 2;
  if (/because|therefore|reason|answer|key|core|Śõ†šłļ|śČÄšĽ•|ŚéüŚõ†|Á≠Ēś°ą|ŚÖ≥ťĒģ|ś†łŚŅÉ/i.test(body.substring(0, 200))) sem += 2;
  dims.push({n:L('Semantic Match','ŤĮ≠šĻČŚĆĻťÖć'), s:sem, m:4, d:sem>=3?L('Title-content intent aligned','ś†áťĘėŚíĆŚÜÖŚģĻšłÄŤáī'):sem>=1?L('Partial match','ťÉ®ŚąÜŚĆĻťÖć'):L('Title and content mismatch','ś†áťĘėŚíĆŚÜÖŚģĻšłćŚĆĻťÖć'), icon:'ūüéĮ'});
  total += sem;

  // 14. Anti-AI Voice 4 ‚ÄĒ research-backed 6-signal detection
  // DESIGN BOUNDARY: GEO-positive structures (comparisons, FAQ, lists) are NOT penalized.
  // Only targets: pure AI vocabulary, RLHF voice, punctuation fingerprints, burstiness deficit.
  
  // Signal A: AI template patterns (forbidden constructions)
  let aiHits = 0;
  for (let p of AI_FORBIDDEN) { aiHits += (ft.match(p) || []).length; }
  
  // Signal B: Banned vocabulary (research-backed, EN+CN)
  for (let w of AI_WASTE) {
    aiHits += (ft.match(new RegExp(escRegex(w), 'gi')) || []).length;
  }
  
  // Signal C: RLHF / instruction-tuning voice (2025-2026 research)
  let rlhfHits = 0;
  for (let [pat] of RLHF_SIGNALS) {
    rlhfHits += (ft.match(pat) || []).length;
  }
  aiHits += rlhfHits;
  
  // Signal D: Sentence diversity + burstiness
  let sents = body.split(/[.!?„ÄāÔľĀÔľü\n]/).map(s => s.trim()).filter(s => s.length > 10);
  let sentLengths = sents.map(s => s.split(/\s+/).length);
  
  let burstiness = 0.0;
  if (sentLengths.length >= 4) {
    let meanLen = sentLengths.reduce((a, b) => a + b, 0) / sentLengths.length;
    let variance = sentLengths.reduce((s, l) => s + (l - meanLen) ** 2, 0) / sentLengths.length;
    burstiness = Math.round(Math.sqrt(variance) * 10) / 10;
  }
  
  // Simple declarative ratio (bias toward simple-sentence patterns)
  let simpleDecl = sents.filter(s => /^.{0,5}(śėĮ|is|are|was|were)\b/.test(s)).length;
  let sentDiversity = 1.0;
  if (sents.length >= 4) {
    let simpleRatio = simpleDecl / sents.length;
    sentDiversity = Math.max(0.3, 1.0 - simpleRatio);
  }
  
  // Signal E: Paragraph opener repetition
  let paraOpeners = [];
  for (let p of paras) {
    let opener = p.trim().substring(0, 15).replace(/[ÔľĆ,.„Äā!ÔľĀ?Ôľü\n]+$/, '');
    if (opener) paraOpeners.push(opener);
  }
  let openerRepeats = 0;
  if (paraOpeners.length >= 3) {
    let oc = {};
    paraOpeners.forEach(o => oc[o] = (oc[o] || 0) + 1);
    openerRepeats = Object.values(oc).reduce((s, c) => s + (c > 1 ? c - 1 : 0), 0);
  }
  
  // Signal F: Punctuation fingerprints (research-validated)
  let emDashCount = (ft.match(/[‚ÄĒ‚Äď]/g) || []).length;
  let emDashDensity = Math.round(emDashCount / Math.max(ft.length, 1) * 500 * 10) / 10;
  let semicolonCount = (ft.match(/;/g) || []).length;
  let curlyQuotes = (ft.match(/[\u201c\u201d\u2018\u2019]/g) || []).length;
  let punctScore = 1.0;  // 1.0 = clean, 0.0 = heavy AI punctuation
  if (emDashDensity > 2) punctScore -= 0.3;
  if (semicolonCount > 3) punctScore -= 0.3;
  if (curlyQuotes > 2) punctScore -= 0.4;
  punctScore = Math.max(0.0, punctScore);
  
  // Score synthesis (6 signals)
  let deai;
  if (sents.length < 4 || body.trim().length < 80) {
    // Insufficient signal: cap at 3/4, note uncertainty
    deai = sents.length >= 1 ? 3 : 2;
  } else {
    deai = 4;
    if (aiHits > 5) deai -= 2;
    else if (aiHits > 2) deai -= 1;
    if (burstiness < 5 && sentLengths.length >= 4) deai -= 1;  // SD < 5 = metronomic
    if (sentDiversity < 0.5) deai -= 1;
    if (openerRepeats > 2) deai -= 1;
    if (punctScore < 0.4) deai -= 1;
  }
  deai = Math.max(0, deai);
  
  // Diagnosis string
  let reasons = [];
  if (aiHits > 0) reasons.push(`${aiHits} AI-tells`);
  if (burstiness < 5 && sentLengths.length >= 4)
    reasons.push(`burstiness=${burstiness}${burstiness > 0 ? '(low)' : '(uniform)'}`);
  if (sentDiversity < 0.7) reasons.push(`diversity=${sentDiversity.toFixed(2)}`);
  if (openerRepeats > 0) reasons.push(`${openerRepeats} repeated openers`);
  if (punctScore < 0.7) reasons.push(`punct=${punctScore.toFixed(2)}`);
  
  let deaiD = deai >= 4 ? 'Clean human voice' :
              deai >= 3 ? 'Minor signals: ' + reasons.join(', ') :
              deai >= 1 ? 'Mixed signals: ' + reasons.join(', ') :
              'Heavy AI voice: ' + reasons.join(', ');
  
  dims.push({n:L('Anti-AI Voice','ŚéĽAIŤÖĒ'), s:deai, m:4, d:deaiD, icon:'ūü§Ė'});
  total += deai;

  let pct = Math.round(total / maxTotal * 100);
  let grade = pct >= 85 ? 'S' : pct >= 70 ? 'A' : pct >= 50 ? 'B' : 'C';
  let circleCls = grade === 'S' ? 's-great' : grade === 'A' ? 's-good' : grade === 'B' ? 's-ok' : 's-poor';
  let sugg = [];
  dims.forEach(d => { if (d.s / d.m < 0.5) sugg.push({t:'fix', m:`${d.n} low: ${d.d}`}); });
  if (sugg.length < 2) sugg.push({t:'good', m:L('Overall GEO-friendly. Keep publishing.','śēīšĹďGEOŚŹčŚ•ĹŚļ¶ŤČĮŚ•Ĺ„Äā')});

  return { title, total, maxTotal, pct, grade, circleCls, dims, sugg, 
           textLength: ft.length, paraCount: paras.length, avgParaLen: Math.round(avg), dataCount: nm,
           voice_details: { ai_word_count: aiHits, rlhf_signals: rlhfHits, burstiness, 
                            sentence_diversity: Math.round(sentDiversity * 100) / 100,
                            sentence_count: sents.length, opener_repeats: openerRepeats,
                            simple_declarative_pct: Math.round(simpleDecl / Math.max(sents.length, 1) * 100),
                            punctuation: { em_dash_count: emDashCount, em_dash_per_500_chars: emDashDensity,
                                           semicolon_count: semicolonCount, curly_quote_count: curlyQuotes,
                                           punct_score: Math.round(punctScore * 100) / 100 } } };
}

function runCheck() { document.getElementById("resultContent").innerHTML="<p style='text-align:center;padding:20px;color:var(--mu)'>ś£ÄśĶčšł≠...</p>";document.getElementById("resultPanel").style.display="block";

// ‚ĒÄ‚ĒÄ Survey (pops once after 3rd detection, never again) ‚ĒÄ‚ĒÄ
const SURVEY_KEY = 'geo_auditor_survey_done';
const SURVEY_THRESHOLD = 3;

function maybeShowSurvey() {
  if (localStorage.getItem(SURVEY_KEY)) return;
  let cnt = parseInt(localStorage.getItem('geo_auditor_run_count') || '0');
  cnt++;
  localStorage.setItem('geo_auditor_run_count', cnt);
  if (cnt >= SURVEY_THRESHOLD) {
    document.getElementById('surveyCard').style.display = 'block';
    document.getElementById('surveyCard').scrollIntoView({behavior: 'smooth'});
  }
}

function submitSurvey() {
  const q1 = document.querySelector('input[name="q1"]:checked');
  const q2 = document.querySelector('input[name="q2"]:checked');
  if (!q1 || !q2) { toast('Please answer both questions'); return; }
  // Log locally (no server ‚ÄĒ privacy-first)
  const surveys = JSON.parse(localStorage.getItem('geo_auditor_surveys') || '[]');
  surveys.push({q1: q1.value, q2: q2.value, ts: new Date().toISOString()});
  localStorage.setItem('geo_auditor_surveys', JSON.stringify(surveys));
  localStorage.setItem(SURVEY_KEY, '1');
  document.getElementById('surveyCard').innerHTML = '<p style="color:#3fb950">‚úď Thanks! Your input shapes what we build next.</p>';
}

function dismissSurvey() {
  localStorage.setItem(SURVEY_KEY, '1');
  document.getElementById('surveyCard').style.display = 'none';
}

function renderResult(r) {
  const gradeLabels={'S':L('ūüŹÜ Excellent','ūüŹÜ šľėÁßÄ'),'A':L('‚úÖ Good','‚úÖ ŤČĮŚ•Ĺ'),'B':L('‚ö†ÔłŹ Needs Work','‚ö†ÔłŹ ťúÄśĒĻŤŅõ'),'C':L('‚ĚĆ Rewrite','‚ĚĆ ťáćŚÜô')};
  let html = `
    <div class="${r.circleCls} score-circle">${r.pct}%</div>
    <div class="grade">${gradeLabels[r.grade]} ¬∑ ${r.total}/${r.maxTotal} pts</div>
    <div class="stats">
      <div class="stat"><div class="stat-num">${r.textLength}</div><div class="stat-label">Chars</div></div>
      <div class="stat"><div class="stat-num">${r.paraCount}</div><div class="stat-label">Paras</div></div>
      <div class="stat"><div class="stat-num">${r.avgParaLen}</div><div class="stat-label">Avg Len</div></div>
      <div class="stat"><div class="stat-num">${r.dataCount}</div><div class="stat-label">Data Pts</div></div>
    </div>
    ${r.dims.map(di => `
      <div class="dim-item">
        <span class="dim-icon">${di.icon}</span>
        <span class="dim-name">${di.n}</span>
        <div class="dim-bar"><div class="dim-fill" style="width:${di.s/di.m*100}%;background:${di.s/di.m>=0.7?'#3fb950':di.s/di.m>=0.4?'#d2991d':'#f85149'}"></div></div>
        <span class="dim-score">${di.s}/${di.m}</span>
      </div>
      <div class="dim-desc">${di.d}</div>
    `).join('')}
    <h4 style="margin-top:16px;font-size:14px;color:#fff">ūüí° Suggestions</h4>
    ${r.sugg.map(s => `<div class="sug ${s.t}">${s.m}</div>`).join('')}
  `;

// ‚ĒÄ‚ĒÄ Tabs ‚ĒÄ‚ĒÄ
function showTab(t, evt) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  if (evt) evt.target.classList.add('active');
  document.getElementById('checkPanel').style.display = t === 'check' ? 'block' : 'none';
  document.getElementById('historyPanel').style.display = t === 'history' ? 'block' : 'none';
  if (t === 'history') loadHistory();
}

// ‚ĒÄ‚ĒÄ History (localStorage) ‚ĒÄ‚ĒÄ
const HIST_KEY = 'geo_auditor_history_v2';
const MAX_HIST = 50;

function saveToHistory(r) {
  const text = document.getElementById('contentInput').value.trim();
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) { hist = []; }
  hist.unshift({
    id: Date.now(),
    title: (r.title || '(no title)').substring(0, 60),
    score: r.pct,
    grade: r.grade,
    time: new Date().toLocaleString(),
    text: text.substring(0, 5000),
    dims: r.dims.map(d => ({n: d.n, s: d.s, m: d.m, icon: d.icon}))
  });
  if (hist.length > MAX_HIST) hist = hist.slice(0, MAX_HIST);
  try {
    localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  } catch(e) {
    hist = hist.slice(0, 25);
    localStorage.setItem(HIST_KEY, JSON.stringify(hist));
  }
}

function loadHistory() {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
  const el = document.getElementById('histList');
  if (!hist.length) { el.innerHTML = '<p style="color:var(--mu);text-align:center;padding:30px">No history yet</p>'; return; }
  el.innerHTML = hist.map(r => {
    let clr = r.score >= 85 ? '#3fb950' : r.score >= 70 ? '#58a6ff' : r.score >= 50 ? '#d2991d' : '#f85149';
    return `<div class="hist-row" onclick="viewHistory(${r.id})">
      <span class="hist-score" style="color:${clr}">${r.score}%</span>
      <span class="hist-title">${esc(r.title)}</span>
      <span class="hist-date">${r.time}</span>
    </div>`;
  }).join('');
}

function viewHistory(id) {
  let hist = [];
  try { hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) {}
  const entry = hist.find(h => h.id === id);
  if (!entry) return;
  document.getElementById('contentInput').value = entry.text;
  let r = detect(entry.text);
  renderResult(r);
  document.getElementById('copyBtn').style.display = 'inline-flex';
  window._lastResult = r;
  showTab('check');
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.querySelectorAll('.tab')[1].classList.remove('active');
  document.getElementById('checkPanel').style.display = 'block';
  document.getElementById('historyPanel').style.display = 'none';
}

function clearHistory() {
  if (confirm('Clear all detection history?')) {
    localStorage.removeItem(HIST_KEY);
    loadHistory();
    toast('History cleared');
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2000);
}

window.GEOAuditor = {
  detect: detect,
  version: '0.6.6',
  summarize: function(text) {
    const r = detect(text);
    return {
      score: r.pct,
      grade: r.grade,
      total: r.total + '/' + r.maxTotal,
      weakDims: r.dims.filter(d => d.s / d.m < 0.5).map(d => d.n),
      topIssues: r.sugg.filter(s => s.t === 'fix').map(s => s.m)
    };
  }
};
