name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.7', '3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Smoke test
        run: |
          python3 geo_auditor.py --version
          python3 geo_auditor.py "The quick brown fox jumps over the lazy dog." --json
          python3 geo_auditor.py -f test_samples/simon_willison_blog.txt --json
